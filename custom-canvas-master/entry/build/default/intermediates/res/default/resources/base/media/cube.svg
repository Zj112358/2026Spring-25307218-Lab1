<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Front face (solid) -->
  <line x1="4" y1="8" x2="14" y2="8" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="8" x2="14" y2="18" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="4" y2="18" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="18" x2="4" y2="8" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Back face (solid) -->
  <line x1="8" y1="4" x2="18" y2="4" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="4" x2="18" y2="14" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="14" x2="8" y2="14" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="8" y2="4" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Connecting edges front-to-back (solid) -->
  <line x1="14" y1="8" x2="18" y2="4" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="18" y2="14" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hidden edges (dashed) -->
  <line x1="4" y1="8" x2="8" y2="4" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
  <line x1="4" y1="18" x2="8" y2="14" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
  <line x1="8" y1="4" x2="8" y2="14" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
</svg>
