<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216 216" width="216" height="216">
  <defs>
    <linearGradient id="startBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EBF5FB"/>
      <stop offset="40%" stop-color="#D6EAF8"/>
      <stop offset="100%" stop-color="#AED6F1"/>
    </linearGradient>
    <linearGradient id="startPen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#34495E"/>
    </linearGradient>
    <linearGradient id="startNib" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4D03F"/>
      <stop offset="50%" stop-color="#D4AC0D"/>
      <stop offset="100%" stop-color="#B7950B"/>
    </linearGradient>
    <linearGradient id="startInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </linearGradient>
    <filter id="startShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="216" height="216" rx="48" ry="48" fill="url(#startBg)"/>

  <!-- Fountain pen body -->
  <g transform="translate(108,108) rotate(-45) translate(-108,-108)" filter="url(#startShadow)">
    <rect x="88" y="42" width="14" height="90" rx="3" ry="3" fill="url(#startPen)"/>
    <rect x="90" y="132" width="10" height="22" rx="2" ry="2" fill="#5D6D7E"/>
    <rect x="87" y="130" width="16" height="3" rx="1" fill="url(#startNib)"/>
    <rect x="87" y="153" width="16" height="3" rx="1" fill="url(#startNib)"/>
    <polygon points="95,155 99,155 100,178 97,182 94,178" fill="url(#startNib)"/>
    <line x1="97" y1="158" x2="97" y2="180" stroke="#7D6608" stroke-width="0.8"/>
    <circle cx="97" cy="162" r="1.5" fill="#7D6608"/>
    <rect x="102" y="48" width="3" height="50" rx="1.5" fill="#BDC3C7"/>
    <circle cx="103.5" cy="48" r="2.5" fill="#BDC3C7"/>
    <rect x="88" y="38" width="14" height="8" rx="3" ry="3" fill="#1A252F"/>
  </g>

  <!-- Color palette -->
  <g filter="url(#startShadow)">
    <circle cx="155" cy="155" r="28" fill="#FDFEFE" stroke="#D5D8DC" stroke-width="1.5"/>
    <circle cx="148" cy="143" r="5" fill="#E74C3C"/>
    <circle cx="163" cy="143" r="5" fill="#F39C12"/>
    <circle cx="170" cy="155" r="5" fill="#27AE60"/>
    <circle cx="163" cy="167" r="5" fill="#2980B9"/>
    <circle cx="148" cy="167" r="5" fill="#8E44AD"/>
    <circle cx="141" cy="155" r="5" fill="#E91E63"/>
  </g>

  <!-- Ink drop -->
  <g transform="translate(72, 80)">
    <path d="M0,-8 C4,-8 8,-4 8,0 C8,4 4,8 0,8 C-4,8 -8,4 -8,0 C-8,-4 -4,-8 0,-8 Z" fill="url(#startInk)" opacity="0.85"/>
    <ellipse cx="-2" cy="-2" rx="2" ry="1.5" fill="white" opacity="0.3"/>
  </g>

  <!-- Sparkle -->
  <g transform="translate(58, 68)" opacity="0.7">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#F4D03F" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#F4D03F" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8" stroke="#F4D03F" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="2.8" y1="-2.8" x2="-2.8" y2="2.8" stroke="#F4D03F" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>
